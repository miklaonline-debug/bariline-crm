// Sequential loader: guarantees each script is fully loaded before the next
function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src;
    s.crossOrigin = 'anonymous';
    s.onload = resolve;
    s.onerror = function() { reject(new Error('Failed to load: ' + src)); };
    document.head.appendChild(s);
  });
}

async function loadReact() {
  for (var i = 0; i < cdns.length; i++) {
    try {
      await loadScript(cdns[i][0]);
      await loadScript(cdns[i][1]);
      if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') return true;
    } catch(e) { console.warn('CDN ' + i + ' failed, trying next...', e); }
  }
  return false;
}

// ─── Firestore Service Layer ────────────────────────────────────────────────

let _db = null;
let _dbReady = false;
function getDb() {
  if (_db && _dbReady) return _db;
  if (typeof firebase === "undefined") return null;
  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }
  if (!_db) {
    _db = firebase.firestore();
    _dbReady = true;
    // Enable offline persistence (best-effort, won't block operations)
    _db.enablePersistence({
      synchronizeTabs: true
    }).catch(err => {
      console.warn("Firestore persistence failed:", err.code);
    });
  }
  return _db;
}
const COLLECTIONS = {
  accounts: "accounts",
  workOrders: "workOrders",
  serviceCalls: "serviceCalls",
  installers: "installers",
  customers: "customers",
  inventory: "inventory",
  notifications: "notifications",
  usageStats: "usageStats"
};

// Read/write counters for usage monitoring
const usageCounters = {
  reads: 0,
  writes: 0,
  deletes: 0,
  sessionStart: Date.now()
};
async function fsLoadCollection(collectionName, fromServer) {
  const db = getDb();
  if (!db) return null;
  try {
    const opts = fromServer ? {
      source: "server"
    } : {};
    const snapshot = await db.collection(collectionName).get(opts);
    usageCounters.reads += snapshot.size || 1;
    if (snapshot.empty) return [];
    return snapshot.docs.map(doc => loadLocalFields(collectionName, {
      _docId: doc.id,
      ...doc.data()
    }));
  } catch (err) {
    // If server fetch fails, fall back to cache
    if (fromServer) {
      try {
        const cached = await db.collection(collectionName).get({
          source: "cache"
        });
        usageCounters.reads += cached.size || 1;
        if (cached.empty) return [];
        return cached.docs.map(doc => loadLocalFields(collectionName, {
          _docId: doc.id,
          ...doc.data()
        }));
      } catch (e) {/* fall through */}
    }
    console.error("Firestore load error:", collectionName, err);
    return null;
  }
}

// Fields that contain large base64 data — save to localStorage instead of Firestore
const LOCAL_STORAGE_FIELDS = ["signatureData", "measurementPhoto", "orderPdfData"];
const PHOTO_FIELDS = ["photos"];
function saveLocalFields(collectionName, docId, data) {
  try {
    // Save oversized photo fields to localStorage as backup
    if (data.photos && typeof data.photos === "object") {
      const photoData = {};
      Object.entries(data.photos).forEach(([key, val]) => {
        if (typeof val === "string" && val.length > MAX_FIELD_SIZE) {
          photoData[key] = val;
        }
      });
      if (Object.keys(photoData).length > 0) {
        localStorage.setItem(`fs_photos_${collectionName}_${docId}`, JSON.stringify(photoData));
      }
    }
    LOCAL_STORAGE_FIELDS.forEach(field => {
      if (data[field] && typeof data[field] === "string" && data[field].length > MAX_FIELD_SIZE) {
        localStorage.setItem(`fs_${field}_${collectionName}_${docId}`, data[field]);
      }
    });
  } catch (e) {
    console.warn("localStorage save failed:", e);
  }
}
function loadLocalFields(collectionName, doc) {
  try {
    const docId = doc.id || doc._docId;
    if (!docId) return doc;
    const result = {
      ...doc
    };
    // Restore photos
    const savedPhotos = localStorage.getItem(`fs_photos_${collectionName}_${docId}`);
    if (savedPhotos) {
      try {
        const parsed = JSON.parse(savedPhotos);
        result.photos = {
          ...(result.photos || {}),
          ...parsed
        };
      } catch (e) {}
    }
    // Restore other large fields
    LOCAL_STORAGE_FIELDS.forEach(field => {
      const saved = localStorage.getItem(`fs_${field}_${collectionName}_${docId}`);
      if (saved) result[field] = saved;
    });
    return result;
  } catch (e) {
    return doc;
  }
}

// Compress an image (base64 data URL) to fit within Firestore limits
// Returns a promise that resolves to a compressed base64 JPEG string
function compressImage(dataUrl, maxWidth = 800, quality = 0.55) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let w = img.width,
        h = img.height;
      if (w > maxWidth) {
        h = Math.round(h * maxWidth / w);
        w = maxWidth;
      }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => resolve(dataUrl); // fallback to original if compression fails
    img.src = dataUrl;
  });
}

// Deep-sanitize an object for Firestore: remove undefined, functions, symbols, convert special types
function sanitizeForFirestore(obj) {
  if (obj === null || obj === undefined) return null;
  if (typeof obj === "boolean" || typeof obj === "number" || typeof obj === "string") return obj;
  if (Array.isArray(obj)) return obj.map(sanitizeForFirestore).filter(v => v !== undefined);
  if (typeof obj === "object") {
    const clean = {};
    Object.entries(obj).forEach(([key, val]) => {
      if (val === undefined || typeof val === "function" || typeof val === "symbol") return; // skip
      clean[key] = sanitizeForFirestore(val);
    });
    return clean;
  }
  return null; // fallback — skip unsupported types
}

// Max size per field for Firestore storage (300KB base64 ≈ 225KB raw image)
const MAX_FIELD_SIZE = 300000;
function stripLargeFields(data) {
  const clean = {
    ...data
  };
  delete clean._docId;
  // Strip only truly huge photos (uncompressed originals) — keep compressed ones
  if (clean.photos && typeof clean.photos === "object") {
    const stripped = {};
    Object.entries(clean.photos).forEach(([key, val]) => {
      stripped[key] = typeof val === "string" && val.length > MAX_FIELD_SIZE ? true : val;
    });
    clean.photos = stripped;
  }
  // Strip only truly large fields — compressed ones should fit
  LOCAL_STORAGE_FIELDS.forEach(field => {
    if (clean[field] && typeof clean[field] === "string" && clean[field].length > MAX_FIELD_SIZE) {
      clean[field] = true;
    }
  });
  return clean;
}
async function fsSaveDocument(collectionName, docId, data) {
  const db = getDb();
  if (!db) return false;
  try {
    // Save large base64 fields to localStorage
    saveLocalFields(collectionName, docId, data);
    // Strip large fields before saving to Firestore (1MB limit)
    const stripped = stripLargeFields(data);
    // Deep-sanitize to remove undefined/functions that Firestore rejects
    const cleanData = sanitizeForFirestore(stripped);
    await db.collection(collectionName).doc(String(docId)).set(cleanData);
    usageCounters.writes++;
    return true;
  } catch (err) {
    console.error("Firestore save error:", collectionName, docId, err);
    return false;
  }
}
async function fsDeleteDocument(collectionName, docId) {
  const db = getDb();
  if (!db) return false;
  try {
    await db.collection(collectionName).doc(String(docId)).delete();
    usageCounters.deletes++;
    return true;
  } catch (err) {
    console.error("Firestore delete error:", collectionName, docId, err);
    return false;
  }
}
async function fsSeedCollection(collectionName, items, idField = "id") {
  const db = getDb();
  if (!db) return;
  const batch = db.batch();
  items.forEach(item => {
    const docRef = db.collection(collectionName).doc(String(item[idField]));
    batch.set(docRef, item);
  });
  await batch.commit();
  usageCounters.writes += items.length;
}
async function fsSaveUsageStats() {
  const db = getDb();
  if (!db) return;
  const today = new Date().toISOString().slice(0, 10);
  const docRef = db.collection(COLLECTIONS.usageStats).doc(today);
  try {
    const doc = await docRef.get();
    if (doc.exists) {
      const existing = doc.data();
      await docRef.update({
        reads: (existing.reads || 0) + usageCounters.reads,
        writes: (existing.writes || 0) + usageCounters.writes,
        deletes: (existing.deletes || 0) + usageCounters.deletes,
        lastUpdated: new Date().toISOString()
      });
    } else {
      await docRef.set({
        date: today,
        reads: usageCounters.reads,
        writes: usageCounters.writes,
        deletes: usageCounters.deletes,
        lastUpdated: new Date().toISOString()
      });
    }
    usageCounters.reads = 0;
    usageCounters.writes = 0;
    usageCounters.deletes = 0;
  } catch (err) {
    console.warn("Usage stats save failed:", err);
  }
}

};

// ─── PDF Renderer (renders PDF pages into canvases) ─────────────────────────

const PdfRenderer = ({
  pdfData,
  containerRef
}) => {
  useEffect(() => {
    if (!pdfData || !containerRef.current) return;
    const container = containerRef.current;
    const renderPdf = async () => {
      try {
        const base64 = pdfData.split(",")[1];
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const pdf = await window.pdfjsLib.getDocument({
          data: bytes
        }).promise;
        container.innerHTML = "";
        const dpr = window.devicePixelRatio || 1;
        // Use 4x minimum scale for crisp text
        const hiResScale = Math.max(dpr, 4);
        for (let p = 1; p <= pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const baseViewport = page.getViewport({
            scale: 1
          });
          // Use full container width
          const displayWidth = Math.max(container.clientWidth, 350);
          const cssScale = displayWidth / baseViewport.width;
          const renderScale = cssScale * hiResScale;
          const viewport = page.getViewport({
            scale: renderScale
          });
          const canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          canvas.style.width = displayWidth + "px";
          canvas.style.height = Math.round(displayWidth * baseViewport.height / baseViewport.width) + "px";
          canvas.style.display = "block";
          canvas.style.marginBottom = "10px";
          canvas.style.background = "#fff";
          // Enable crisp rendering
          canvas.style.imageRendering = "auto";
          container.appendChild(canvas);
          const ctx = canvas.getContext("2d");
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";
          await page.render({
            canvasContext: ctx,
            viewport
          }).promise;
        }
      } catch (err) {
        container.innerHTML = '<div style="text-align:center;padding:30px;color:#ef4444;">שגיאה בטעינת PDF</div>';
        console.error("PDF render error:", err);
      }
    };
    renderPdf();
  }, [pdfData, containerRef]);
  return null;
};
